<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpino · Your Journey</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#F6F1E9;--cream-dk:#EDE6D8;--cream-border:#D8CEBC;
  --amber:#C47A3A;--amber-dk:#A35F20;--amber-lt:#F0D4A8;
  --green:#2A6640;--green-dk:#1D4D2E;--green-lt:#E4F0E8;
  --ink:#1C1C1A;--ink-md:#4A4845;--ink-lt:#8A8780;
  --white:#FDFAF5;--red:#c0392b;
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;min-height:100vh;}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;background:var(--cream);border-bottom:1px solid var(--cream-border);position:sticky;top:0;z-index:200;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:var(--ink);}
.nav-logo em{color:var(--amber);font-style:normal;}
.nav-streak{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;color:var(--green-dk);background:var(--green-lt);padding:6px 12px;letter-spacing:1px;}
.nav-streak .fire{font-size:14px;}

/* ── LOADING / ERROR STATES ── */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px;text-align:center;gap:16px;}
.state-icon{font-size:48px;}
.state-h{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--ink);line-height:1;}
.state-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-lt);letter-spacing:2px;max-width:400px;line-height:1.8;}
.state-btn{display:inline-block;background:var(--amber);color:var(--white);font-size:12px;font-weight:700;letter-spacing:1.5px;padding:14px 28px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase;text-decoration:none;margin-top:8px;}
.spinner{width:32px;height:32px;border:3px solid var(--cream-border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── JOURNEY HEADER ── */
.journey-header{background:var(--ink);padding:48px 40px 40px;position:relative;overflow:hidden;}
.jh-bg{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:180px;color:rgba(196,122,58,0.06);letter-spacing:10px;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;}
.jh-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:3px;margin-bottom:12px;}
.jh-h{font-family:'Bebas Neue',sans-serif;font-size:72px;color:var(--white);line-height:0.9;letter-spacing:1px;margin-bottom:8px;}
.jh-h em{color:var(--amber);font-style:normal;}
.jh-sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(253,250,245,0.4);letter-spacing:2px;}
.jh-name{font-family:'Space Mono',monospace;font-size:11px;color:rgba(253,250,245,0.55);letter-spacing:2px;margin-bottom:10px;}

/* ── STREAK + PROGRESS STAT GRID ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--cream-border);}
.stat-cell{background:var(--amber);padding:28px 32px;display:flex;flex-direction:column;gap:4px;}
.stat-cell.dark{background:var(--ink);}
.stat-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(28,28,26,0.45);text-transform:uppercase;}
.stat-cell.dark .stat-label{color:rgba(253,250,245,0.3);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--ink);line-height:0.85;}
.stat-cell.dark .stat-num{color:var(--amber);}
.stat-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ink);letter-spacing:1px;}
.stat-cell.dark .stat-title{color:var(--white);}
.stat-msg{font-size:11px;color:rgba(28,28,26,0.6);margin-top:2px;line-height:1.5;}
.stat-cell.dark .stat-msg{color:rgba(253,250,245,0.4);}

/* ── 7-DAY PROGRESS SECTION ── */
.progress-section{background:var(--cream);padding:40px;}
.ps-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:3px;margin-bottom:16px;}
.ps-h{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--ink);margin-bottom:24px;line-height:1;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.day-block{display:flex;flex-direction:column;align-items:center;gap:6px;}
.day-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;position:relative;transition:all 0.2s;}
.day-circle.done{background:var(--amber);color:var(--white);}
.day-circle.done::after{content:'✓';position:absolute;font-size:9px;bottom:-1px;right:-1px;background:var(--green);color:var(--white);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}
.day-circle.today-active{background:var(--green);color:var(--white);box-shadow:0 0 0 3px var(--green-lt);}
.day-circle.today-done{background:var(--green);color:var(--white);}
.day-circle.today-done::after{content:'✓';position:absolute;font-size:9px;bottom:-1px;right:-1px;background:var(--amber);color:var(--white);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}
.day-circle.locked{background:var(--cream-border);color:var(--ink-lt);}
.day-circle.missed{background:rgba(192,57,43,0.15);color:var(--red);opacity:0.6;}
.day-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--ink-lt);letter-spacing:1px;text-align:center;}
.day-label.active-label{color:var(--green-dk);font-weight:700;}
.day-label.done-label{color:var(--amber);}
.progress-bar-wrap{margin:20px 0 8px;background:var(--cream-border);height:6px;position:relative;}
.progress-bar-fill{height:100%;background:var(--amber);transition:width 0.6s ease;}
.progress-pct{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-lt);letter-spacing:1px;text-align:right;margin-top:4px;}

/* ── TODAY'S TASK SECTION ── */
.today-section{background:var(--cream-dk);padding:40px;}
.ts-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:3px;margin-bottom:16px;}
.ts-card{background:var(--white);border:1px solid var(--cream-border);padding:28px;}
.ts-status-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.ts-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ts-status-dot.green{background:var(--green);}
.ts-status-dot.amber{background:var(--amber);}
.ts-status-dot.red{background:var(--red);}
.ts-status-text{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--ink-md);}

/* Task type badge */
.task-type-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;margin-bottom:16px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;font-weight:700;border-left:3px solid;}
.task-type-badge.easy{background:rgba(42,100,64,0.08);border-color:var(--green);color:var(--green-dk);}
.task-type-badge.push{background:rgba(196,122,58,0.1);border-color:var(--amber);color:var(--amber-dk);}
.task-type-badge.push_high{background:rgba(196,122,58,0.15);border-color:var(--amber-dk);color:var(--amber-dk);}
.task-type-badge.recovery{background:rgba(74,158,255,0.1);border-color:#4A9EFF;color:#1a5fa8;}
.task-type-badge.reflection{background:rgba(124,111,205,0.1);border-color:#7C6FCD;color:#5a4fa0;}
.task-type-badge.comeback{background:rgba(233,196,106,0.15);border-color:#E9C46A;color:#8a6a10;}

/* Task description */
.task-desc-box{background:var(--ink);padding:20px 22px;margin-bottom:20px;border-left:4px solid var(--amber);}
.task-desc-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--amber);letter-spacing:2px;margin-bottom:10px;}
.task-desc-text{font-size:14px;color:rgba(253,250,245,0.88);line-height:1.85;white-space:pre-line;}

/* Mark done button */
.mark-btn{width:100%;background:var(--green);color:var(--white);font-size:13px;font-weight:700;letter-spacing:1.5px;padding:18px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.mark-btn:hover:not(:disabled){background:var(--green-dk);}
.mark-btn:disabled{opacity:0.7;cursor:not-allowed;}
.mark-btn .btn-icon{font-size:16px;}

/* Already done message */
.done-msg{text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--green-dk);letter-spacing:1px;padding:18px;background:var(--green-lt);border:1px solid rgba(42,100,64,0.2);}

/* Missed / no task states */
.missed-msg{text-align:center;padding:20px;background:rgba(192,57,43,0.06);border-left:3px solid var(--red);}
.missed-msg p{font-size:13px;color:var(--ink-md);line-height:1.7;}
.missed-msg strong{color:var(--red);}

/* ── NEXT DAY PREVIEW ── */
.next-section{background:var(--cream);padding:40px;}
.next-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--amber);letter-spacing:3px;margin-bottom:16px;}
.next-h{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ink);margin-bottom:16px;line-height:1;}
.next-card{border:1px solid var(--cream-border);padding:20px 24px;display:flex;gap:18px;align-items:flex-start;opacity:0.65;}
.next-day-badge{background:var(--cream-dk);padding:10px 14px;text-align:center;min-width:56px;flex-shrink:0;}
.next-day-num{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--amber);line-height:1;}
.next-day-label{font-family:'Space Mono',monospace;font-size:7px;color:var(--ink-lt);letter-spacing:1px;margin-top:2px;}
.next-info{}
.next-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.next-lock{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-lt);letter-spacing:1px;margin-top:8px;display:flex;align-items:center;gap:6px;}

/* ── COMPLETE HOOK ── */
.complete-hook{background:var(--green);padding:32px 40px;}
.ch-tag{font-family:'Space Mono',monospace;font-size:9px;color:rgba(228,240,232,0.5);letter-spacing:3px;margin-bottom:12px;}
.ch-h{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--green-lt);line-height:1;margin-bottom:8px;}
.ch-body{font-size:13px;color:rgba(228,240,232,0.7);line-height:1.7;margin-bottom:20px;max-width:440px;}
.ch-actions{display:flex;gap:12px;flex-wrap:wrap;}
.ch-btn-primary{background:var(--amber);color:var(--white);font-size:12px;font-weight:700;letter-spacing:1.5px;padding:14px 24px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase;transition:background 0.15s;}
.ch-btn-primary:hover{background:var(--amber-dk);}
.ch-btn-secondary{background:transparent;color:var(--green-lt);font-size:12px;font-weight:700;letter-spacing:1.5px;padding:14px 24px;border:1px solid rgba(228,240,232,0.3);cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase;transition:all 0.15s;}
.ch-btn-secondary:hover{border-color:var(--green-lt);}

/* ── CHAIN SECTION ── */
.chain-section{background:var(--green);padding:40px;text-align:center;}
.chain-h{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--green-lt);line-height:1;margin-bottom:8px;}
.chain-sub{font-family:'Space Mono',monospace;font-size:10px;color:rgba(228,240,232,0.5);letter-spacing:2px;}
.chain-dots{display:flex;justify-content:center;gap:8px;margin:20px 0;}
.chain-dot{width:14px;height:14px;border-radius:50%;background:rgba(228,240,232,0.2);transition:background 0.3s;}
.chain-dot.filled{background:var(--amber);}
.chain-dot.missed{background:rgba(192,57,43,0.45);}

/* ── FOOTER ── */
.footer{background:var(--ink);padding:28px 40px;display:flex;align-items:center;justify-content:space-between;}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--white);letter-spacing:4px;}
.footer-logo em{color:var(--amber);font-style:normal;}
.footer-line{font-family:'Space Mono',monospace;font-size:9px;color:rgba(253,250,245,0.3);letter-spacing:1px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:var(--white);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;padding:14px 24px;z-index:999;transition:transform 0.3s ease;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .nav{padding:0 18px;}
  .journey-header{padding:36px 18px 32px;}.jh-h{font-size:52px;}
  .stats-grid{grid-template-columns:1fr;}
  .stat-cell{padding:20px 18px;}.stat-num{font-size:60px;}
  .progress-section,.today-section,.next-section,.complete-hook,.chain-section{padding:28px 18px;}
  .days-grid{gap:4px;}.day-circle{width:36px;height:36px;font-size:14px;}
  .footer{padding:20px 18px;flex-direction:column;gap:10px;text-align:center;}
  .ch-actions{flex-direction:column;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">AL<em>P</em>INO</div>
  <div class="nav-streak"><span class="fire">🔥</span><span id="navStreakText">—</span></div>
</nav>

<div id="app">
  <div class="state-screen">
    <div class="spinner"></div>
    <div class="state-sub">Loading your journey...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ================================================================
// ALPINO JOURNEY PAGE v4.1
// Fix 1: tasks array bootstrapped from token task when active_plan_id is null
// Fix 2: markTaskDone pushes to tasks array if not found (idx === -1)
// ================================================================

// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://cwgkibigjhzjoyumfjfh.supabase.co';
const ANON_KEY      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3Z2tpYmlnamh6am95dW1mamZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQyNjY4NTIsImV4cCI6MjA1OTg0Mjg1Mn0.Ov7VDPEqFV-GnA2yVdpBG_Bv_VL_q0_jXFNuA11nJNY';

// Server endpoint
const SERVER_BASE   = 'https://wholetruth.onrender.com';

const _sb = window.supabase.createClient(SUPABASE_URL, ANON_KEY);
const _urlParams = new URLSearchParams(window.location.search);
const _token = (_urlParams.get('t') || '').trim();

// ── STATE ────────────────────────────────────────────────────────
let _state = {
  token:       _token,
  user:        null,
  intent:      null,
  userState:   null,
  tasks:       [],
  todayTask:   null,
  token_valid: false,
  token_used:  false,
  token_expired: false,
  isMarking:   false,
};

// ── TASK TYPE CONFIG ─────────────────────────────────────────────
const TASK_TYPE_CFG = {
  easy:       { emoji: '🌿', label: 'EASY DAY',       cls: 'easy'       },
  push:       { emoji: '💪', label: 'PUSH DAY',       cls: 'push'       },
  push_high:  { emoji: '🔥', label: 'PEAK DAY',       cls: 'push_high'  },
  recovery:   { emoji: '🔄', label: 'RECOVERY DAY',   cls: 'recovery'   },
  reflection: { emoji: '🏆', label: 'REFLECTION DAY', cls: 'reflection' },
  comeback:   { emoji: '🔁', label: 'COMEBACK DAY',   cls: 'comeback'   },
};

// ── HELPERS ──────────────────────────────────────────────────────
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast' + (isError ? ' error' : ''); }, 3200);
}

function getISTDateStr(date) {
  const d = date || new Date();
  return new Date(d.getTime() + (5.5 * 3600000))
    .toISOString().slice(0, 10);
}

function isToday(dateStr) {
  if (!dateStr) return false;
  return getISTDateStr(new Date(dateStr)) === getISTDateStr();
}

function calcStreakLive(userState) {
  if (!userState || !userState.last_completed_date) return 0;
  const lastDate = getISTDateStr(new Date(userState.last_completed_date));
  const today    = getISTDateStr();
  const yesterday = getISTDateStr(new Date(Date.now() - 86400000));
  if (lastDate === today || lastDate === yesterday) return userState.current_streak || 0;
  return 0;
}

// ── LOAD APP ─────────────────────────────────────────────────────
async function loadApp() {
  if (!_token) {
    return renderNoToken();
  }

  // Step 1: Validate token
  const { data: tokenRow, error: tokenErr } = await _sb
    .from('completion_tokens')
    .select('task_id, user_id, used, expires_at')
    .eq('token', _token)
    .maybeSingle();

  if (tokenErr || !tokenRow) {
    return renderInvalidToken();
  }

  const now = new Date();
  _state.token_valid   = true;
  _state.token_used    = tokenRow.used === true;
  _state.token_expired = new Date(tokenRow.expires_at) < now;

  const { task_id, user_id } = tokenRow;

  // Step 2: Load user
  const { data: user } = await _sb
    .from('users')
    .select('id, name, email')
    .eq('id', user_id)
    .maybeSingle();

  if (!user) return renderInvalidToken();
  _state.user = user;

  // Step 3: Load user_intent
  const { data: intent } = await _sb
    .from('user_intent')
    .select('goal, lifestyle, diet_pref')
    .eq('user_id', user_id)
    .maybeSingle();
  _state.intent = intent || {};

  // Step 4: Load user_state
  const { data: userState } = await _sb
    .from('user_state')
    .select('current_streak, longest_streak, last_completed_day, last_completed_date, fatigue_score, active_plan_id')
    .eq('user_id', user_id)
    .maybeSingle();
  _state.userState = userState || { current_streak: 0, longest_streak: 0, last_completed_day: 0, fatigue_score: 0 };

  // Step 5: Load all tasks for active plan (if active_plan_id exists)
  const planId = userState?.active_plan_id;
  if (planId) {
    const { data: tasks } = await _sb
      .from('habit_tasks')
      .select('id, plan_id, day_number, task_type, scheduled_date, status, description, dosage, completion_type, completed_at')
      .eq('plan_id', planId)
      .eq('user_id', user_id)
      .order('day_number', { ascending: true });

    _state.tasks = tasks || [];
  }

  // Step 6: Load today's task (always from token's task_id, include plan_id)
  const { data: tokenTask } = await _sb
    .from('habit_tasks')
    .select('id, plan_id, day_number, task_type, scheduled_date, status, description, dosage, completion_type, completed_at')
    .eq('id', task_id)
    .maybeSingle();

  _state.todayTask = tokenTask;

  // FIX 1: If tasks array is empty (active_plan_id was null in user_state),
  // bootstrap by loading all tasks using the plan_id from the token task itself.
  if (_state.tasks.length === 0 && tokenTask && tokenTask.plan_id) {
    const { data: allTasks } = await _sb
      .from('habit_tasks')
      .select('id, plan_id, day_number, task_type, scheduled_date, status, description, dosage, completion_type, completed_at')
      .eq('plan_id', tokenTask.plan_id)
      .eq('user_id', user_id)
      .order('day_number', { ascending: true });

    _state.tasks = allTasks || [tokenTask];
  }

  renderJourney();
}

// ── MARK DONE ────────────────────────────────────────────────────
async function markTaskDone() {
  if (_state.isMarking) return;

  if (_state.token_used) {
    showToast('Already marked complete ✅');
    return;
  }
  if (_state.token_expired) {
    showToast('This link has expired. Check your next email.', true);
    return;
  }
  if (!_state.todayTask || _state.todayTask.status === 'completed') {
    showToast('Already done for today ✅');
    return;
  }

  _state.isMarking = true;
  const btn = document.getElementById('markDoneBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0 auto;"></div>'; }

  try {
    const resp = await fetch(SERVER_BASE + '/complete-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: _token }),
    });

    if (!resp.ok) {
      const body = await resp.json().catch(() => ({}));
      if (resp.status === 410) {
        _state.token_used = true;
        _state.todayTask.status = 'completed';
        // FIX 2: ensure tasks array reflects completion
        const idx410 = _state.tasks.findIndex(t => t.id === _state.todayTask.id);
        if (idx410 !== -1) {
          _state.tasks[idx410].status = 'completed';
        } else {
          _state.tasks.push({ ..._state.todayTask, status: 'completed' });
        }
        renderJourney();
        showToast('Already marked complete ✅');
        return;
      }
      throw new Error(body.message || 'Server error ' + resp.status);
    }

    const result = await resp.json();

    // Update local state immediately
    _state.token_used = true;
    _state.todayTask.status = 'completed';
    _state.todayTask.completed_at = new Date().toISOString();

    if (_state.userState) {
      _state.userState.current_streak = result.new_streak || (_state.userState.current_streak + 1);
      _state.userState.last_completed_day  = _state.todayTask.day_number;
      _state.userState.last_completed_date = new Date().toISOString();
    }

    // FIX 2: Update tasks array — if task not found (was empty before bootstrap),
    // push it so progress counter and day circles update correctly.
    const idx = _state.tasks.findIndex(t => t.id === _state.todayTask.id);
    if (idx !== -1) {
      _state.tasks[idx].status = 'completed';
    } else {
      _state.tasks.push({ ..._state.todayTask, status: 'completed' });
    }

    renderJourney();
    showToast('Day ' + _state.todayTask.day_number + ' done. Don\'t break the chain.');

  } catch (err) {
    console.error('[markTaskDone]', err);
    showToast('Error saving. Try again.', true);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-icon">✅</span> Mark as Done';
    }
  } finally {
    _state.isMarking = false;
  }
}

// ── RENDER: STATES ───────────────────────────────────────────────
function renderNoToken() {
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <div class="state-icon">📬</div>
      <div class="state-h">Check Your Email</div>
      <div class="state-sub">Open the daily habit email from Alpino and tap the "Mark as Done" button inside it to reach your journey page.</div>
    </div>
    <footer class="footer"><div class="footer-logo">AL<em>P</em>INO</div><div class="footer-line">Your journey, day by day</div></footer>
  `;
}

function renderInvalidToken() {
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <div class="state-icon">🔗</div>
      <div class="state-h">Link Not Found</div>
      <div class="state-sub">This link is invalid or has expired. Check your latest Alpino habit email for a fresh link.</div>
    </div>
    <footer class="footer"><div class="footer-logo">AL<em>P</em>INO</div><div class="footer-line">Your journey, day by day</div></footer>
  `;
}

// ── RENDER: MAIN JOURNEY ─────────────────────────────────────────
function renderJourney() {
  const { user, intent, userState, tasks, todayTask, token_used, token_expired } = _state;
  const app = document.getElementById('app');

  const streak      = calcStreakLive(userState);
  const completedN  = tasks.filter(t => t.status === 'completed').length;
  const totalDays   = tasks.length || 7;
  const allDone     = completedN >= totalDays && totalDays > 0;
  const pct         = Math.round((completedN / totalDays) * 100);
  const todayDone   = todayTask?.status === 'completed' || token_used;
  const streakMsg   = ['Start here.', 'Day 1 done. The chain has begun.', "Two days. Don't break it.",
    "Three days. It's becoming real.", "Halfway. You're still here.", "Five days. This is a habit.",
    "One more day left.", "7 days done. You built this."];
  const firstName   = user?.name ? user.name.split(' ')[0] : '';

  // Nav streak
  const navEl = document.getElementById('navStreakText');
  if (navEl) navEl.textContent = streak > 0 ? streak + '-day streak' : (completedN > 0 ? 'Keep going' : 'Day 1');

  // ── DAY CIRCLES ──
  let dayCirclesHTML = '';
  for (let d = 1; d <= totalDays; d++) {
    const task   = tasks.find(t => t.day_number === d);
    const status = task ? task.status : 'locked';
    const isTodays = task && todayTask && task.id === todayTask.id;

    let cls, label;
    if (status === 'completed') {
      cls   = isTodays ? 'today-done' : 'done';
      label = `<div class="day-label done-label">DAY ${d}</div>`;
    } else if (status === 'missed') {
      cls   = 'missed';
      label = `<div class="day-label">MISSED</div>`;
    } else if (isTodays && !todayDone) {
      cls   = 'today-active';
      label = `<div class="day-label active-label">TODAY</div>`;
    } else if (isTodays && todayDone) {
      cls   = 'today-done';
      label = `<div class="day-label done-label">TODAY</div>`;
    } else {
      cls   = 'locked';
      label = `<div class="day-label">DAY ${d}</div>`;
    }

    dayCirclesHTML += `
      <div class="day-block">
        <div class="day-circle ${cls}">${d}</div>
        ${label}
      </div>`;
  }

  // ── CHAIN DOTS ──
  let chainDots = '';
  for (let d = 1; d <= totalDays; d++) {
    const task = tasks.find(t => t.day_number === d);
    const dotCls = task?.status === 'completed' ? 'filled' : task?.status === 'missed' ? 'missed' : '';
    chainDots += `<div class="chain-dot ${dotCls}"></div>`;
  }

  // ── TODAY'S TASK CARD ──
  let todayCardHTML = '';
  if (!todayTask) {
    todayCardHTML = `
      <div class="ts-status-row">
        <div class="ts-status-dot amber"></div>
        <div class="ts-status-text">NO TASK FOUND FOR TODAY</div>
      </div>
      <div class="missed-msg"><p>Your next task email will arrive tomorrow morning. Check back then.</p></div>`;
  } else {
    const taskCfg   = TASK_TYPE_CFG[todayTask.task_type] || TASK_TYPE_CFG['easy'];
    const statusDot = todayDone ? 'green' : 'amber';
    const statusTxt = todayDone
      ? `DAY ${todayTask.day_number} COMPLETE`
      : `DAY ${todayTask.day_number} — WAITING FOR YOU`;

    const taskDesc  = todayTask.description || 'Complete today\'s habit task.';

    const actionHTML = todayDone
      ? `<div class="done-msg">✓ Day ${todayTask.day_number} marked complete. Come back tomorrow — don't break the chain.</div>`
      : (token_expired
          ? `<div class="missed-msg"><p><strong>This link has expired.</strong> Your next habit email will arrive tomorrow morning.</p></div>`
          : `<button class="mark-btn" id="markDoneBtn" onclick="markTaskDone()">
               <span class="btn-icon">✅</span> Mark as Done
             </button>
             <p style="font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-lt);letter-spacing:1px;text-align:center;margin-top:10px;">Tap when you complete today's habit. Takes 2 seconds.</p>`
        );

    todayCardHTML = `
      <div class="ts-status-row">
        <div class="ts-status-dot ${statusDot}"></div>
        <div class="ts-status-text">${statusTxt}</div>
      </div>
      <div class="task-type-badge ${taskCfg.cls}">${taskCfg.emoji} ${taskCfg.label}</div>
      <div class="task-desc-box">
        <div class="task-desc-label">// Day ${todayTask.day_number} — your task today</div>
        <div class="task-desc-text">${taskDesc}</div>
      </div>
      ${actionHTML}`;
  }

  // ── NEXT DAY PREVIEW ──
  let nextSectionHTML = '';
  if (todayDone && !allDone && todayTask) {
    const nextTask = tasks.find(t => t.day_number === todayTask.day_number + 1);
    if (nextTask) {
      const nextCfg = TASK_TYPE_CFG[nextTask.task_type] || TASK_TYPE_CFG['easy'];
      nextSectionHTML = `
        <div class="next-section">
          <div class="next-tag">// Coming up</div>
          <div class="next-h">DAY ${nextTask.day_number} PREVIEW</div>
          <div class="next-card">
            <div class="next-day-badge">
              <div class="next-day-num">${nextTask.day_number}</div>
              <div class="next-day-label">DAY</div>
            </div>
            <div class="next-info">
              <div class="next-title">${nextCfg.emoji} ${nextCfg.label}</div>
              <div class="next-lock">🔒 Unlocks tomorrow — check your email</div>
            </div>
          </div>
        </div>`;
    }
  }

  // ── COMPLETE HOOK ──
  let completeHookHTML = '';
  if (allDone) {
    completeHookHTML = `
      <div class="complete-hook">
        <div class="ch-tag">// 7-day habit built</div>
        <div class="ch-h">YOU BUILT<br>A HABIT.</div>
        <div class="ch-body">7 days of intentional nutrition. Most people quit at Day 3. You finished.</div>
        <div class="ch-actions">
          <button class="ch-btn-primary" onclick="shareProgress()">Share my achievement</button>
        </div>
      </div>`;
  } else if (todayDone) {
    completeHookHTML = `
      <div class="complete-hook" style="background:var(--green-dk);">
        <div class="ch-tag">// Day ${todayTask ? todayTask.day_number : ''} complete</div>
        <div class="ch-h">COME BACK<br>TOMORROW.</div>
        <div class="ch-body">One day at a time. Your next task arrives tomorrow morning.</div>
      </div>`;
  }

  const headerSub = allDone
    ? 'CHALLENGE COMPLETE — 7 DAYS DONE'
    : todayDone
    ? 'TODAY DONE — COME BACK TOMORROW'
    : 'CONSISTENCY STARTS HERE';

  const dayNumDisplay = todayTask ? todayTask.day_number : (completedN + 1);

  // ── ASSEMBLE ──
  app.innerHTML = `
    <div class="journey-header">
      <div class="jh-bg">JOURNEY</div>
      ${firstName ? `<div class="jh-name">// ${firstName.toUpperCase()}'S JOURNEY</div>` : '<div class="jh-tag">// Your progress</div>'}
      <div class="jh-h">YOU'RE ON<br><em>DAY ${dayNumDisplay}.</em></div>
      <div class="jh-sub">${headerSub}</div>
    </div>

    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-label">// Streak</div>
        <div class="stat-num">${streak}</div>
        <div class="stat-title">${streak === 1 ? 'DAY IN A ROW' : streak === 0 ? 'BROKEN' : 'DAYS IN A ROW'}</div>
        <div class="stat-msg">${streakMsg[Math.min(streak, streakMsg.length - 1)]}</div>
      </div>
      <div class="stat-cell dark">
        <div class="stat-label">// Progress</div>
        <div class="stat-num">${completedN}</div>
        <div class="stat-title">${completedN === totalDays ? 'DAYS DONE' : 'OF ' + totalDays + ' DAYS'}</div>
        <div class="stat-msg">${completedN === totalDays ? 'Challenge complete.' : (totalDays - completedN) + ' days remaining.'}</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="ps-tag">// 7-day challenge</div>
      <div class="ps-h">YOUR WEEK</div>
      <div class="days-grid">${dayCirclesHTML}</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-pct">${completedN} of ${totalDays} days — ${pct}%</div>
    </div>

    <div class="today-section">
      <div class="ts-tag">// Today's action</div>
      <div class="ts-card">${todayCardHTML}</div>
    </div>

    ${nextSectionHTML}
    ${completeHookHTML}

    <div class="chain-section">
      <div class="chain-h">DON'T<br>BREAK<br>THE CHAIN.</div>
      <div class="chain-sub">// ${completedN} of ${totalDays} days complete</div>
      <div class="chain-dots">${chainDots}</div>
    </div>

    <footer class="footer">
      <div class="footer-logo">AL<em>P</em>INO</div>
      <div class="footer-line">© 2025 Alpino Health Foods — your journey, day by day</div>
    </footer>
  `;
}

// ── SHARE ─────────────────────────────────────────────────────────
function shareProgress() {
  const completedN = _state.tasks.filter(t => t.status === 'completed').length;
  const text = completedN >= 7
    ? 'I just completed the 7-day Alpino habit challenge. Built a real nutrition habit.'
    : `Day ${_state.todayTask?.day_number || completedN} with Alpino. Building the protein habit.`;
  if (navigator.share) {
    navigator.share({ title: 'My Alpino Journey', text });
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
  }
}

// ── BOOT ─────────────────────────────────────────────────────────
loadApp().catch(err => {
  console.error('[loadApp crash]', err);
  document.getElementById('app').innerHTML = `
    <div class="state-screen">
      <div class="state-icon">⚠️</div>
      <div class="state-h">Something went wrong</div>
      <div class="state-sub">Try refreshing the page. If the problem persists, open the email link again.</div>
    </div>`;
});
</script>
